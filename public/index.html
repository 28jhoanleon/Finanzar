<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#060b14;color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:160px;overscroll-behavior:none}
.app{max-width:430px;margin:0 auto}
.header{padding:52px 20px 14px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#060b14ee;backdrop-filter:blur(16px);z-index:100;border-bottom:1px solid #1e293b}
.header-title{font-size:20px;font-weight:800}
.tabs{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:transparent;border:none;border-radius:10px;padding:7px 14px;color:#64748b;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}
.tab.active{background:#3b82f6;color:#fff}
.content{padding:4px 16px 20px}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:16px;padding:18px;margin-bottom:14px}
.lbl{color:#64748b;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.bignum{font-size:40px;font-weight:800;font-family:monospace;color:#f8fafc}
.mednum{font-size:20px;font-weight:800;font-family:monospace;color:#f8fafc}
.sectitle{color:#94a3b8;font-size:13px;font-weight:700;margin-bottom:12px}
.pb{background:#1e293b;border-radius:99px;overflow:hidden}
.pbf{border-radius:99px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.badge{display:inline-block;border-radius:99px;padding:3px 10px;font-size:12px;font-weight:600}
.bg{background:#14532d;color:#86efac}
.br{background:#450a0a;color:#fca5a5}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #1e293b;font-size:13px}
.row:last-child{border-bottom:none}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#080e1aee;backdrop-filter:blur(16px);border-top:1px solid #1e293b;display:flex;justify-content:space-around;padding:10px 0 22px;z-index:100}
.nbtn{background:none;border:none;color:#475569;font-size:10px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 10px;font-family:inherit}
.nbtn.active{color:#3b82f6}
.ni{font-size:20px}
input[type=text],input[type=number],select{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 14px;color:#f8fafc;font-family:inherit;font-size:15px;width:100%;outline:none}
input:focus,select:focus{border-color:#3b82f6}
select option{background:#1e293b}
.flbl{color:#94a3b8;font-size:12px;font-weight:600;margin-bottom:6px;display:block}
.fg{margin-bottom:14px}
input[type=range]{width:100%;accent-color:#f97316;cursor:pointer}
.btn{border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:transform .1s}
.btn:active{transform:scale(.97)}
.pri{background:#3b82f6;color:#fff}
.gho{background:#1e293b;color:#94a3b8}
.dan{background:#450a0a;color:#fca5a5}
.bsm{background:#1e293b;border:none;border-radius:10px;padding:7px 12px;color:#94a3b8;font-size:12px;cursor:pointer;font-weight:600;font-family:inherit}
.bsm.on{background:#1d4ed8;color:#fff}
.aibub{background:#1e293b;border-radius:16px 16px 16px 4px;padding:14px;margin-bottom:10px;font-size:13px;color:#e2e8f0;line-height:1.6;border-left:3px solid #3b82f6}
.dots{display:flex;gap:4px;padding:14px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:#64748b;animation:bounce .8s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.chart-wrap{position:relative;height:200px;margin:10px 0}
.overlay{position:fixed;inset:0;background:#000b;z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#0f172a;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:430px;max-height:85vh;overflow-y:auto;animation:su .3s cubic-bezier(.4,0,.2,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mtitle{font-size:18px;font-weight:800;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.mclose{background:#1e293b;border:none;color:#94a3b8;border-radius:99px;width:32px;height:32px;cursor:pointer;font-size:16px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#f8fafc;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:300;white-space:nowrap;border:1px solid #334155}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.lvlbadge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#422006,#1c1000);border:1px solid #f59e0b44;border-radius:99px;padding:4px 12px;font-size:12px;font-weight:700;color:#fbbf24}
.hidden{display:none!important}
@keyframes vozpulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.6}}
@keyframes listening{0%,100%{box-shadow:0 0 0 0 #ef444466}70%{box-shadow:0 0 0 12px #ef444400}}

:root{--bg:#060b14;--bg2:#0f172a;--bg3:#1e293b;--border:#1e293b;--text:#f8fafc;--sub:#94a3b8;--dim:#64748b;--dim2:#475569}
body.light{--bg:#f1f5f9;--bg2:#ffffff;--bg3:#e2e8f0;--border:#cbd5e1;--text:#0f172a;--sub:#475569;--dim:#64748b;--dim2:#94a3b8}
body{background:var(--bg);color:var(--text)}
.header{background:var(--bg)ee;border-bottom:1px solid var(--border)}
.card{background:var(--bg2);border-color:var(--border)}
.pb{background:var(--bg3)}
.tab{color:var(--dim2)}
.nbtn{color:var(--dim2)}
.bottom-nav{background:var(--bg)ee;border-color:var(--border)}
input[type=text],input[type=number],select{background:var(--bg3);border-color:var(--border);color:var(--text)}
.bsm{background:var(--bg3);color:var(--sub)}
.btn.gho{background:var(--bg3);color:var(--sub)}
.modal{background:var(--bg2)}
.sectitle{color:var(--sub)}
.lbl{color:var(--dim)}
.flbl{color:var(--sub)}
.row{border-color:var(--border)}
</style>
</head>
<body>

  <div class="header" id="mainHeader">
    <div class="header-title">💰 FinanzasAR</div>

  <button class="nbtn" id="nav-metas" onclick="setTab('metas',null,'metas')"><span class="ni">🎯</span>Metas</button>

  <button class="nbtn" id="nav-logros" onclick="setTab('logros',null,'logros')"><span class="ni">🏆</span>Logros</button>
  <button class="nbtn" id="btnVoz" onclick="iniciarVoz()" style="position:relative">

  </button>

</div>

<!-- FAB rápido -->
<button id="fabBtn" onclick="toggleFAB()" style="position:fixed;bottom:96px;right:16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;color:#fff;font-size:24px;cursor:pointer;z-index:150;box-shadow:0 4px 20px #3b82f688;transition:transform .2s;display:flex;align-items:center;justify-content:center">⚡</button>

<script>
// ─── STORAGE ─────────────────────────────────────────────────────────────────
var SKEY = 'finanzas_ar_v4';
function loadDB() {
  try { var r = localStorage.getItem(SKEY); if (r) {
    var d = JSON.parse(r);
    // Migration: asignar campo orden si no existe
    if(d.billeteras) {
      d.billeteras.forEach(function(b,i){ if(b.orden===undefined||b.orden===null) b.orden=i; });
      // Ordenar por orden para garantizar consistencia
      d.billeteras.sort(function(a,b){return (a.orden||0)-(b.orden||0);});
    }
    return d;
  }} catch(e) {}
  return defaultDB();
}
function saveDB() { localStorage.setItem(SKEY, JSON.stringify(DB)); }
function daysAgo(n) { var d = new Date(); d.setDate(d.getDate()-n); return d.toISOString().split('T')[0]; }
function defaultDB() {
  return {
    apiKey:'', ingresos:0, presupuesto:0,
    onboardingDone:false, xp:0, racha:0, logros:[], aiHistory:[], darkMode:true, catsExtra:{},
    dolarCache:null, dolarTs:0,
    billeteras:[
      {id:1,nombre:'Efectivo',icon:'💵',color:'#22c55e',saldo:0,orden:0},
      {id:2,nombre:'Banco',icon:'🏦',color:'#3b82f6',saldo:0,orden:1},
      {id:3,nombre:'Mercado Pago',icon:'🔵',color:'#009ee3',saldo:0,orden:2},
      {id:4,nombre:'Fiwind',icon:'🟡',color:'#eab308',saldo:0,orden:3},
      {id:5,nombre:'Ripio',icon:'🟣',color:'#7c3aed',saldo:0,orden:4}
    ],
    metas:[],
    historialMensual:[],
    transacciones:[],
    deudas:[],
    favoritos:[
      {id:1, desc:'Almuerzo',    cat:'comida',     monto:4500,  icon:'🍱', tipo:'gasto'},
      {id:2, desc:'Café',        cat:'comida',     monto:1800,  icon:'☕', tipo:'gasto'},
      {id:3, desc:'Colectivo',   cat:'transporte', monto:800,   icon:'🚌', tipo:'gasto'},
      {id:4, desc:'Nafta',       cat:'transporte', monto:15000, icon:'⛽', tipo:'gasto'},
      {id:5, desc:'Super',       cat:'comida',     monto:12000, icon:'🛒', tipo:'gasto'},
      {id:6, desc:'Delivery',    cat:'salidas',    monto:6000,  icon:'🛵', tipo:'gasto'}
    ]
  };
}
var DB = loadDB();

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
var CATS = {
  comida:{label:'Comida',icon:'🛒',color:'#ef4444'},
  transporte:{label:'Transporte',icon:'🚌',color:'#22c55e'},
  salidas:{label:'Salidas',icon:'🎉',color:'#f97316'},
  servicios:{label:'Servicios',icon:'💡',color:'#60a5fa'},
  ropa:{label:'Ropa',icon:'👕',color:'#a78bfa'},
  sueldo:{label:'Sueldo',icon:'💰',color:'#22c55e'},
  extra:{label:'Extra',icon:'⭐',color:'#fbbf24'},
  otro:{label:'Otro',icon:'📦',color:'#64748b'}
};
var PRESUP = {comida:200000,transporte:80000,salidas:120000,servicios:100000,ropa:60000};
var INFLATION = 0.042;

// ─── COMPUTED ─────────────────────────────────────────────────────────────────
function getResumenSemanal() {
  var hoy = new Date(), gastosSem = 0, ingresosSem = 0, gastosSemAnt = 0;
  var inicioSem = new Date(hoy); inicioSem.setDate(hoy.getDate() - hoy.getDay() + (hoy.getDay()===0?-6:1)); inicioSem.setHours(0,0,0,0);
  var inicioSemAnt = new Date(inicioSem); inicioSemAnt.setDate(inicioSem.getDate()-7);
  var finSemAnt = new Date(inicioSem); finSemAnt.setDate(inicioSem.getDate()-1);
  DB.transacciones.forEach(function(t){
    var d = new Date(t.fecha+'T12:00:00');
    if(d>=inicioSem && d<=hoy) {
      if(t.tipo==='gasto') gastosSem+=t.monto;
      else ingresosSem+=t.monto;
    } else if(d>=inicioSemAnt && d<=finSemAnt) {
      if(t.tipo==='gasto') gastosSemAnt+=t.monto;
    }
  });
  var diff = gastosSem - gastosSemAnt;
  var diasTranscurridos = hoy.getDay()===0?7:hoy.getDay(); // lunes=1
  var proySem = diasTranscurridos>0 ? Math.round(gastosSem/diasTranscurridos*7) : 0;
  return { gastos:gastosSem, ingresos:ingresosSem, semAnt:gastosSemAnt, diff:diff, proy:proySem, dias:diasTranscurridos };
}

function getMesActual() {
  var now = new Date(), y = now.getFullYear(), m = now.getMonth();
  return DB.transacciones.filter(function(t) {
    var d = new Date(t.fecha); return d.getFullYear()===y && d.getMonth()===m;
  });
}
function getGastosMes() { return getMesActual().filter(function(t){return t.tipo==='gasto';}).reduce(function(s,t){return s+t.monto;},0); }
function getSaldoTx() { return DB.transacciones.reduce(function(s,t){return t.tipo==='ingreso'?s+t.monto:s-t.monto;},0); }
function getSaldoBills() { return (DB.billeteras||[]).reduce(function(s,b){return s+b.saldo;},0); }
function getSaldo() { return getSaldoTx()+getSaldoBills(); }
function getGastosCat() {
  var r={};
  getMesActual().filter(function(t){return t.tipo==='gasto';}).forEach(function(t){r[t.cat]=(r[t.cat]||0)+t.monto;});
  return r;
}
function getLevel() {
  var levels=[{n:1,name:'Principiante',need:100},{n:2,name:'Aprendiz',need:250},{n:3,name:'Consciente',need:500},{n:4,name:'Disciplinado',need:1000},{n:5,name:'Maestro',need:2000},{n:6,name:'Experto',need:5000}];
  var lvl=levels[0];
  for(var i=0;i<levels.length;i++){if(DB.xp>=levels[i].need){lvl=levels[i];}else{lvl=levels[i];break;}}
  var prev=lvl.n>1?levels[lvl.n-2]:null;
  var base=prev?prev.need:0;
  var p=Math.min(100,Math.round(((DB.xp-base)/(lvl.need-base))*100));
  return {n:lvl.n,name:lvl.name,need:lvl.need,pct:p,xp:DB.xp};
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmt(n) {
  if(isNaN(n)||n===null||n===undefined) return '$0';
  return '$\u202f'+Math.round(n).toLocaleString('es-AR');
}
function fmtShort(n) {
  if(n>=1000000) return '$'+Math.round(n/1000000*10)/10+'M';
  if(n>=1000) return '$'+Math.round(n/1000)+'k';
  return fmt(n);
}
// Formatea un input numérico con puntos de miles mientras se tipea
function setupNumInput(el) {
  if(!el||el._fmtReady) return;
  el._fmtReady = true;
  function update() {
    var raw = el.value.replace(/\./g,'').replace(/,/g,'').replace(/[^0-9]/g,'');
    el._rawVal = raw ? parseInt(raw) : '';
    if(raw.length >= 1) {
      var pos = el.selectionStart, oldLen = el.value.length;
      el.value = raw ? parseInt(raw).toLocaleString('es-AR') : '';
      var diff = el.value.length - oldLen;
      try{ el.setSelectionRange(Math.max(0,pos+diff), Math.max(0,pos+diff)); } catch(e){}
    }
  }
  el.addEventListener('input', update);
  el.addEventListener('paste', function(){ setTimeout(update, 0); });
  el.addEventListener('focus', function(){ if(!el.value) el.value=''; });
}
function getNumVal(id) {
  var el = document.getElementById(id); if(!el) return 0;
  var raw = (el._rawVal !== undefined) ? el._rawVal : el.value.replace(/\./g,'').replace(/,/g,'').replace(/[^0-9]/g,'');
  return parseFloat(raw)||0;
}
function setupNumInputs() {
  document.querySelectorAll('input[data-num]').forEach(function(el){ setupNumInput(el); });
}
// Inputs numéricos con formato visual
function attachFmtInput(el) {
  if(!el || el._fmtAttached) return;
  el._fmtAttached = true;
  el.type = 'text';
  el.inputMode = 'numeric';
  el.autocomplete = 'off';
  function refresh() {
    var raw = el.value.replace(/[^0-9]/g,'');
    el._raw = raw ? parseInt(raw) : 0;
    var pos = el.selectionStart;
    var formatted = raw ? parseInt(raw).toLocaleString('es-AR') : '';
    el.value = formatted;
  }
  el.addEventListener('input', function(e) {
    var raw = el.value.replace(/[^0-9]/g,'');
    el._raw = raw ? parseInt(raw) : 0;
    el.value = raw ? parseInt(raw).toLocaleString('es-AR') : '';
  });
  el.addEventListener('focus', function() {
    if(!el.value || el.value==='0') el.value='';
  });
  el.addEventListener('blur', function() {
    if(!el._raw) el.value='';
  });
  // Init with existing value
  var init = parseFloat(el.value)||0;
  el._raw = init;
  el.value = init ? init.toLocaleString('es-AR') : '';
}

}

function fetchDolar(force) {
  var now=Date.now();
  if(!force && DB.dolarCache && now-DB.dolarTs<600000) return Promise.resolve(DB.dolarCache);
  return fetch('https://dolarapi.com/v1/dolares/blue')
    .then(function(r){return r.json();})
    .then(function(d){DB.dolarCache={compra:d.compra,venta:d.venta};DB.dolarTs=Date.now();saveDB();return DB.dolarCache;})
    .catch(function(){return DB.dolarCache||{compra:1340,venta:1360};});
}
function getDolar() {
  if(!DB.dolarCache){fetchDolar().then(function(){if(currentTab==='panel'||currentTab==='inflacion')render();});return {compra:'...',venta:'...'};}
  return DB.dolarCache;
}

function renderResumenSemanal() {
  var s = getResumenSemanal();
  if(s.gastos===0 && s.semAnt===0) return ''; // nada que mostrar
  var diffColor = s.diff<=0 ? '#22c55e' : '#ef4444';
  var diffIcon = s.diff<=0 ? '📉' : '📈';
  var diffTxt = s.diff===0 ? 'Igual que la semana pasada'
    : (s.diff>0 ? '+'+fmt(s.diff)+' más que la semana pasada' : fmt(Math.abs(s.diff))+' menos que la semana pasada');
  var dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  var hoy = new Date().getDay();
  // Gasto por día de esta semana
  var porDia = {};
  var inicioSem = new Date(); inicioSem.setDate(new Date().getDate() - hoy + (hoy===0?-6:1)); inicioSem.setHours(0,0,0,0);
  DB.transacciones.forEach(function(t){
    if(t.tipo!=='gasto') return;
    var d=new Date(t.fecha+'T12:00:00');
    if(d>=inicioSem){ var k=d.getDay(); porDia[k]=(porDia[k]||0)+t.monto; }
  });
  var maxDia=Math.max.apply(null,Object.values(porDia).concat([1]));
  var barsDias=[1,2,3,4,5,6,0].map(function(d){
    var g=porDia[d]||0, pct=Math.round(g/maxDia*100), isPast=d<=hoy&&!(d===0&&hoy!==0);
    return '<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1">'
      +'<div style="font-size:9px;color:#475569">'+fmt(g).replace('$\u202f','$').replace('$0','')+'</div>'
      +'<div style="width:100%;height:40px;background:#1e293b;border-radius:4px;display:flex;align-items:flex-end;overflow:hidden">'
      +(g>0?'<div style="width:100%;height:'+pct+'%;background:'+(isPast?'#3b82f6':'#1e293b88')+';border-radius:4px 4px 0 0;transition:height .5s"></div>':'')
      +'</div>'
      +'<div style="font-size:9px;color:'+(d===hoy?'#f8fafc':'#475569')+'">'+dias[d]+'</div>'
      +'</div>';
  }).join('');
  return '<div class="card" style="background:#0a1020;border-color:#3b82f633">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
    +'<div class="sectitle" style="margin:0">📅 Esta semana</div>'
    +'<div style="color:#64748b;font-size:11px">'+s.dias+' días registrados</div></div>'
    +'<div class="g2" style="margin-bottom:12px">'
    +'<div style="background:#1e293b;border-radius:12px;padding:12px;text-align:center"><div class="lbl">Gastos</div><div style="color:#ef4444;font-weight:800;font-size:18px;font-family:monospace;margin-top:4px">'+fmt(s.gastos)+'</div></div>'
    +'<div style="background:#1e293b;border-radius:12px;padding:12px;text-align:center"><div class="lbl">Proyección</div><div style="color:#f8fafc;font-weight:800;font-size:18px;font-family:monospace;margin-top:4px">'+fmt(s.proy)+'</div></div>'
    +'</div>'
    +'<div style="display:flex;gap:4px;margin-bottom:12px;align-items:flex-end">'+barsDias+'</div>'
    +(s.semAnt>0?'<div style="background:#1e293b;border-radius:10px;padding:10px;text-align:center;font-size:12px">'
      +'<span style="color:'+diffColor+'">'+diffIcon+' '+diffTxt+'</span>'
      +'<div style="color:#475569;font-size:11px;margin-top:2px">Sem. anterior: '+fmt(s.semAnt)+'</div></div>':'')
    +'</div>';
}

// ─── HISTORIAL ────────────────────────────────────────────────────────────────
function renderHistorial() {
  var months = DB.historialMensual.slice(-6);
  var gc = getGastosCat();
  var gcKeys = Object.keys(gc).filter(function(k){return gc[k]>0;});
  gcKeys.sort(function(a,b){return gc[b]-gc[a];});
  var totalGastosCat = gcKeys.reduce(function(s,k){return s+gc[k];},0)||1;

  if(months.length === 0 && gcKeys.length === 0) {
    return '<div style="text-align:center;padding:60px 20px">'
      +'<div style="font-size:48px;margin-bottom:16px">📭</div>'
      +'<div style="color:#f8fafc;font-size:18px;font-weight:700;margin-bottom:8px">Todavía no hay historial</div>'
      +'<div style="color:#475569;font-size:14px">Registrá movimientos y acá vas a ver tus gráficos mes a mes.</div>'
      +'</div>';
  }

  // ── 1. INGRESOS VS GASTOS ─────────────────────────────────────────────────
  var barsHtml = '';
  if(months.length > 0) {
    var maxVal = Math.max.apply(null, months.map(function(m){ return Math.max(m.ingresos||0, m.gastos||0, 1); }));
    var last = months[months.length-1];
    var lastDiff = (last.ingresos||0) - (last.gastos||0);
    var lastColor = lastDiff >= 0 ? '#22c55e' : '#ef4444';
    var lastLabel = lastDiff >= 0 ? 'Superávit' : 'Déficit';
    var bestMonth = months.reduce(function(best,m){ return (m.ingresos-m.gastos) > (best.ingresos-best.gastos) ? m : best; }, months[0]);
    var bestDiff = (bestMonth.ingresos||0)-(bestMonth.gastos||0);
    var bestColor = bestDiff >= 0 ? '#22c55e' : '#ef4444';

    // Barras horizontales por mes — mucho más legibles que verticales

      var ing = m.ingresos||0, gas = m.gastos||0;
      var diff = ing - gas;

      var pIng = Math.round((ing/maxVal)*100);
      var pGas = Math.round((gas/maxVal)*100);
      return '<div style="margin-bottom:12px">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">'
        +'<span style="color:#94a3b8;font-size:12px;font-weight:600;width:28px">'+m.mes+'</span>'
        +'<span style="color:'+dc+';font-size:11px;font-weight:700;font-family:monospace">'+(diff>=0?'+':'')+fmt(diff)+'</span>'
        +'</div>'
        +'<div style="display:flex;flex-direction:column;gap:3px">'
        +'<div style="display:flex;align-items:center;gap:6px">'
        +'<span style="color:#22c55e;font-size:9px;width:10px">▲</span>'
        +'<div style="flex:1;background:#1e293b;border-radius:99px;height:7px;overflow:hidden">'
        +'<div style="width:'+pIng+'%;height:100%;background:#22c55e;border-radius:99px;opacity:0.8"></div></div>'
        +'<span style="color:#64748b;font-size:10px;font-family:monospace;min-width:60px;text-align:right">'+fmt(ing)+'</span>'
        +'</div>'
        +'<div style="display:flex;align-items:center;gap:6px">'
        +'<span style="color:#ef4444;font-size:9px;width:10px">▼</span>'
        +'<div style="flex:1;background:#1e293b;border-radius:99px;height:7px;overflow:hidden">'
        +'<div style="width:'+pGas+'%;height:100%;background:#ef4444;border-radius:99px;opacity:0.8"></div></div>'
        +'<span style="color:#64748b;font-size:10px;font-family:monospace;min-width:60px;text-align:right">'+fmt(gas)+'</span>'

      +'</div>'
      +'<div style="background:#0f172a;border-radius:12px;padding:10px;text-align:center">'
      +'<div style="color:#64748b;font-size:10px;margin-bottom:4px">Mejor mes</div>'
      +'<div style="color:#f8fafc;font-size:14px;font-weight:800">'+bestMonth.mes+'</div>'
      +'<div style="color:'+bestColor+';font-size:10px;margin-top:2px">'+(bestDiff>=0?'+':'')+fmt(bestDiff)+'</div>'

  // ── 2. DISTRIBUCIÓN CATEGORÍAS ────────────────────────────────────────────
  var catHtml = '';

        +' stroke-width="'+strokeW+'"'
        +' stroke-dasharray="'+dash.toFixed(2)+' '+(gap+1.5).toFixed(2)+'"'
        +' stroke-dashoffset="'+(-(offset)).toFixed(2)+'"'
        +' stroke-linecap="butt"></circle>';
      offset+=circ*pct;
      return arc;
    }).join('');
    var topCat=CATS[gcKeys[0]]||{label:'',icon:''};
    var topPct=Math.round(gc[gcKeys[0]]/totalGastosCat*100);

      +'<text x="'+cx+'" y="'+(cy+7)+'" text-anchor="middle" fill="#94a3b8" font-size="10">'+topCat.label+'</text>'
      +'<text x="'+cx+'" y="'+(cy+20)+'" text-anchor="middle" font-size="14">'+topCat.icon+'</text>'
      +'</svg>';

    var bars2=gcKeys.slice(0,7).map(function(k){
      var c=CATS[k]||{color:'#64748b',icon:'•',label:k};
      var pct=Math.round(gc[k]/totalGastosCat*100);
      return '<div style="margin-bottom:9px">'
        +'<div style="display:flex;justify-content:space-between;margin-bottom:3px">'
        +'<span style="font-size:12px;color:#e2e8f0">'+c.icon+' '+c.label+'</span>'
        +'<span style="font-size:11px;color:'+c.color+';font-weight:700;font-family:monospace">'+pct+'%</span>'
        +'</div>'
        +'<div style="background:#1e293b;border-radius:99px;height:5px;overflow:hidden">'
        +'<div style="width:'+pct+'%;height:100%;background:linear-gradient(90deg,'+c.color+'cc,'+c.color+');border-radius:99px"></div>'
        +'</div>'
        +'</div>';
    }).join('');

    catHtml='<div class="card" style="background:#0a0f1e;border-color:#1e293b">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'
      +'<div class="sectitle" style="margin:0">🏷️ ¿En qué gasté este mes?</div>'
      +'<div style="color:#64748b;font-size:11px">'+fmt(totalGastosCat)+'</div>'
      +'</div>'
      +'<div style="display:flex;gap:16px;align-items:center">'
      +donut+'<div style="flex:1;min-width:0">'+bars2+'</div>'
      +'</div></div>';
  }

  // ── 3. DETALLE TABLA ──────────────────────────────────────────────────────
  var detalleHtml = months.length > 0
    ? '<div class="card" style="background:#0a0f1e;border-color:#1e293b">'
      +'<div class="sectitle">📋 Resumen mensual</div>'
      + months.slice().reverse().map(function(m){
          var diff = (m.ingresos||0)-(m.gastos||0);
          var diffColor = diff>=0?'#22c55e':'#ef4444';
          var tag = diff>=0
            ? '<span style="background:#14532d;color:#4ade80;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700">+'+fmt(diff)+'</span>'
            : '<span style="background:#450a0a;color:#fca5a5;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700">'+fmt(diff)+'</span>';
          return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1e293b11">'
            +'<div style="color:#f8fafc;font-size:13px;font-weight:600;width:36px">'+m.mes+'</div>'
            +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex:1">'
            +'<div style="display:flex;gap:12px;font-size:11px;font-family:monospace">'
            +'<span style="color:#22c55e">▲ '+(m.ingresos>0?fmt(m.ingresos):'—')+'</span>'
            +'<span style="color:#ef4444">▼ '+fmt(m.gastos)+'</span>'
            +'</div>'
            +'<div>'+tag+'</div>'
            +'</div></div>';
        }).join('')
      +'</div>'
    : '';

  return barsHtml + catHtml + detalleHtml;
}

// ─── INFLACION ────────────────────────────────────────────────────────────────
var calcCuotasMonto = 200000, calcCuotasN = 12, calcCuotasTNA = 0;
function renderInflacion() {
  var factor=Math.pow(1+INFLATION,infMeses), saldo=getSaldo();
  var valorReal=Math.round(saldo/factor), perdida=saldo-valorReal;
  var dolar=getDolar(), tc=typeof dolar.venta==='number'?dolar.venta:1360;
  var usd=Math.round(saldo/tc), infPct=Math.round((factor-1)*100);

  // Calculadora cuotas
  var monto=calcCuotasMonto, n=calcCuotasN, tna=calcCuotasTNA;
  var cuotaSinInteres=Math.round(monto/n);
  var cuotaConInteres, totalConInteres, totalSinInteres=monto, cftAprox;
  if(tna>0){
    var tem=Math.pow(1+tna/100,1/12)-1;
    cuotaConInteres=Math.round(monto*tem/(1-Math.pow(1+tem,-n)));
    totalConInteres=cuotaConInteres*n;
    cftAprox=Math.round(((totalConInteres/monto)-1)*100);
  } else {
    cuotaConInteres=cuotaSinInteres;
    totalConInteres=monto;
    cftAprox=0;
  }

function renderInflacionUpdate() {
  // Re-render only the calc section without full render to avoid slider jump
  var el=document.getElementById('ccMonto');
  if(el) { calcCuotasMonto=+el.value||calcCuotasMonto; }
  el=document.getElementById('ccN'); if(el) calcCuotasN=Math.max(1,+el.value||calcCuotasN);
  el=document.getElementById('ccTNA'); if(el) calcCuotasTNA=+el.value||0;
  render();
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function guardarDatos() {
  var ing=parseFloat(document.getElementById('cfgIng').value), pres=parseFloat(document.getElementById('cfgPres').value);
  if(!ing||!pres){toast('⚠️ Ingresá valores válidos');return;}
  DB.ingresos=ing; DB.presupuesto=pres; saveDB(); toast('✅ Datos guardados');
}
function guardarPresupuestos() {
  ['comida','transporte','salidas','servicios','ropa'].forEach(function(cat){
    var el=document.getElementById('presup_'+cat);
    if(el&&parseFloat(el.value)>0) PRESUP[cat]=parseFloat(el.value);
  });
  toast('✅ Presupuestos guardados'); render();
}
function deleteTx(id) { DB.transacciones=DB.transacciones.filter(function(t){return t.id!==id;}); saveDB(); render(); }
function borrarTodas() { if(!confirm('¿Borrar TODAS las transacciones?'))return; DB.transacciones=[]; saveDB(); toast('✅ Borrado'); render(); }
function borrarHistorial() { if(!confirm('¿Borrar el historial de meses anteriores?'))return; DB.historialMensual=[]; actualizarHistorialMensual(); saveDB(); toast('✅ Historial borrado'); render(); }
function resetApp() { if(!confirm('⚠️ ¿Resetear TODO?'))return; localStorage.removeItem(SKEY); DB=defaultDB(); obStep=0; toast('App reseteada'); setTab('panel'); }

var billDragId = null;
function moverBill(id, dir) {
  var bills = DB.billeteras;
  // Primero ordenar por orden actual para garantizar secuencia correcta
  bills.sort(function(a,b){return (a.orden||0)-(b.orden||0);});
  var idx = bills.findIndex(function(b){return b.id===id;});
  var newIdx = idx+dir;
  if(idx<0||newIdx<0||newIdx>=bills.length) return;
  var tmp=bills[idx]; bills[idx]=bills[newIdx]; bills[newIdx]=tmp;
  // Re-asignar orden secuencialmente
  bills.forEach(function(b,i){b.orden=i;});
  billSort='custom';
  saveDB(); render();
  toast('✅ Orden guardado');
}

function agregarTx() {
  var monto=rawNum('txMonto'), desc=document.getElementById('txDesc').value.trim();
  var cat=document.getElementById('txCat').value, tipo=document.getElementById('txTipo').value;
  if(!monto||monto<=0){toast('⚠️ Ingresá un monto válido');return;}
  if(!desc){toast('⚠️ Escribí una descripción');return;}
  var moneda=document.getElementById('txMoneda')?document.getElementById('txMoneda').value:'ARS';
  var dolarV=getDolar();var tc2=typeof dolarV.venta==='number'?dolarV.venta:1360;
  var montoARS=moneda==='USD'?Math.round(monto*tc2):monto;
  var fechaEl=document.getElementById('txFecha');
  var fechaTx=fechaEl&&fechaEl.value?fechaEl.value:new Date().toISOString().split('T')[0];
  var billEl=document.getElementById('txBill');
  var billId=billEl?parseInt(billEl.value)||null:null;
  // Actualizar saldo billetera
  if(billId){
    var bill=(DB.billeteras||[]).find(function(b){return b.id===billId;});
    if(bill) bill.saldo += tipo==='gasto' ? -montoARS : montoARS;
  }
  DB.transacciones.unshift({id:genId(),tipo:tipo,monto:montoARS,montoOrig:monto,moneda:moneda,cat:cat,desc:desc,fecha:fechaTx,billetera:billId});
  DB.transacciones.sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
  actualizarHistorialMensual();
  DB.racha=Math.min(DB.racha+1,365);
  if(DB.logros.indexOf('primer_gasto')<0)DB.logros.push('primer_gasto');
  saveDB(); addXP(tipo==='ingreso'?20:15,tipo==='ingreso'?'Ingreso registrado':'Gasto registrado');
  closeModal(); setTab('panel');
}

function guardarEditTx() {
  var id=parseInt(document.getElementById('txEditId').value);
  var t=(DB.transacciones||[]).find(function(x){return x.id===id;}); if(!t) return;
  var monto=rawNum('txMonto'), desc=document.getElementById('txDesc').value.trim();
  if(!monto||monto<=0){toast('⚠️ Ingresá un monto válido');return;}
  if(!desc){toast('⚠️ Escribí una descripción');return;}
  var tipo=document.getElementById('txTipo').value;
  var cat=document.getElementById('txCat').value;
  var fechaTx=document.getElementById('txFecha').value||t.fecha;
  var billId=parseInt(document.getElementById('txBill').value)||null;
  var billOrigId=parseInt(document.getElementById('txEditBillOrig').value)||null;
  var montoOrig=parseInt(document.getElementById('txEditMontoOrig').value)||0;
  var tipoOrig=document.getElementById('txEditTipoOrig').value;
  // Revertir efecto anterior en billetera original
  if(billOrigId){
    var bOrig=(DB.billeteras||[]).find(function(b){return b.id===billOrigId;});
    if(bOrig) bOrig.saldo += tipoOrig==='gasto' ? montoOrig : -montoOrig;
  }
  // Aplicar nuevo efecto
  if(billId){
    var bNew=(DB.billeteras||[]).find(function(b){return b.id===billId;});
    if(bNew) bNew.saldo += tipo==='gasto' ? -monto : monto;
  }
  t.monto=monto; t.montoOrig=monto; t.desc=desc; t.tipo=tipo; t.cat=cat; t.fecha=fechaTx; t.billetera=billId;
  DB.transacciones.sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
  actualizarHistorialMensual(); saveDB();
  toast('✅ Movimiento actualizado'); closeModal(); setTab('panel');
}

function hacerTransferencia() {
  var origenId=parseInt(document.getElementById('trfOrigen').value);
  var destinoId=parseInt(document.getElementById('trfDestino').value);
  var monto=rawNum('trfMonto');
  if(origenId===destinoId){toast('⚠️ Elegí billeteras distintas');return;}
  if(!monto||monto<=0){toast('⚠️ Ingresá un monto');return;}
  var origen=(DB.billeteras||[]).find(function(b){return b.id===origenId;});
  var destino=(DB.billeteras||[]).find(function(b){return b.id===destinoId;});
  if(!origen||!destino) return;
  if(origen.saldo < monto){toast('⚠️ Saldo insuficiente en '+origen.nombre);return;}
  origen.saldo -= monto; destino.saldo += monto;
  // Registrar en historial de movimientos
  DB.transacciones.unshift({
    id:genId(), tipo:'transferencia', monto:monto, montoOrig:monto, moneda:'ARS',
    cat:'otro', desc:'🔄 '+origen.nombre+' → '+destino.nombre,
    billetera:origenId, billeteraDestino:destinoId,
    fecha:new Date().toISOString().slice(0,10)
  });
  actualizarHistorialMensual();
  saveDB(); closeModal();
  toast('🔄 '+fmt(monto)+' de '+origen.nombre+' → '+destino.nombre);
  render();
}
function distribuirCobro() {
  // Si ponen total, sugerimos distribuir proporcionalmente al saldo actual
  var total = rawNum('cobroTotal');
  if(!total) return;
  var bills = DB.billeteras||[];
  var totalSaldo = bills.reduce(function(s,b){return s+Math.max(b.saldo,1);},0);
  bills.forEach(function(b){
    var el=document.getElementById('cobro_'+b.id); if(!el) return;
    var prop = Math.round((Math.max(b.saldo,1)/totalSaldo)*total);
    el.value = prop > 0 ? prop.toLocaleString('es-AR') : '';
  });
  actualizarSumaCobro();
}
function actualizarSumaCobro() {
  var bills = DB.billeteras||[];
  var sum = bills.reduce(function(s,b){
    var el=document.getElementById('cobro_'+b.id);
    if(!el) return s;
    return s+(parseFloat((el.value||'').replace(/\./g,''))||0);
  },0);
  var el=document.getElementById('cobroSum');
  if(el) el.textContent=fmt(sum);
}
function guardarCobro() {
  var bills = DB.billeteras||[];
  var distribs = [];
  bills.forEach(function(b){
    var el=document.getElementById('cobro_'+b.id); if(!el) return;
    var monto=parseFloat((el.value||'').replace(/\./g,''))||0;
    if(monto>0) distribs.push({bill:b, monto:monto});
  });
  if(distribs.length===0){toast('⚠️ Ingresá al menos un monto');return;}
  var totalCobro = distribs.reduce(function(s,d){return s+d.monto;},0);
  // Actualizar saldos
  distribs.forEach(function(d){
    d.bill.saldo += d.monto;
  });
  // Registrar como ingreso en transacciones
  var desc = distribs.length===1
    ? '💰 Sueldo · '+distribs[0].bill.nombre
    : '💰 Sueldo ('+distribs.length+' billeteras)';
  DB.transacciones.unshift({
    id:genId(), tipo:'ingreso', monto:totalCobro, montoOrig:totalCobro,
    moneda:'ARS', cat:'sueldo', desc:desc,
    billetera: distribs[0].bill.id,
    fecha: new Date().toISOString().slice(0,10)
  });
  // Actualizar ingreso mensual en DB
  DB.ingresos = totalCobro;
  actualizarHistorialMensual();
  DB.racha = Math.min(DB.racha+1,365);
  saveDB();
  addXP(50,'¡Cobro registrado! 💰');
  closeModal();
  toast('💰 '+fmt(totalCobro)+' distribuidos en '+distribs.length+' billetera'+(distribs.length>1?'s':''));
  render();
}

function render() {

  var c=document.getElementById('mainContent');
  if(miniMode){
    document.getElementById('tabsRow').classList.add('hidden');
    document.getElementById('bottomNav').classList.add('hidden');
    var saldo=getSaldo(), gp=pct(getGastosMes(),DB.presupuesto), sem=semaforo(gp);
    c.innerHTML='<div style="text-align:center;margin:24px 0 18px">'
      +'<div style="color:#64748b;font-size:13px;margin-bottom:6px">Saldo total</div>'
      +'<div style="font-size:38px;font-weight:800;font-family:monospace;color:#f8fafc">'+fmt(saldo)+'</div>'
      +'<div style="font-size:28px;margin-top:8px">'+sem.emoji+'</div>'
      +'<div style="color:#94a3b8;font-size:13px;margin-top:4px">'+sem.msg+'</div></div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 16px">'
      +'<button style="border:none;border-radius:14px;padding:18px 8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:6px;background:#ef444422;border:1px solid #ef444444;color:#ef4444" onclick="toggleMini();openModal(\'add\')"><span style="font-size:24px">➕</span>Gasto</button>'
      +'<button style="border:none;border-radius:14px;padding:18px 8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:6px;background:#22c55e22;border:1px solid #22c55e44;color:#22c55e" onclick="toggleMini();openModal(\'add\');setTimeout(function(){setTipo(\'ingreso\');},50)"><span style="font-size:24px">💰</span>Ingreso</button>'
      +'<button style="border:none;border-radius:14px;padding:18px 8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:6px;background:#3b82f622;border:1px solid #3b82f644;color:#3b82f6" onclick="toggleMini()"><span style="font-size:24px">📊</span>Full</button></div>';
    return;
  }
  document.getElementById('tabsRow').classList.remove('hidden');
  document.getElementById('bottomNav').classList.remove('hidden');
  if(currentTab==='panel')          c.innerHTML=renderPanel();
  else if(currentTab==='metas')     c.innerHTML=renderMetas();
  else if(currentTab==='historial') c.innerHTML=renderHistorial();
  else if(currentTab==='logros')    c.innerHTML=renderLogros();
  else if(currentTab==='inflacion') c.innerHTML=renderInflacion();
  else if(currentTab==='deudas')    c.innerHTML=renderDeudas();
  else if(currentTab==='simulador') c.innerHTML=renderSimulador();
  else if(currentTab==='ia')        c.innerHTML=renderIA();
  else if(currentTab==='config')    c.innerHTML=renderConfig();
  animBars();
  if(currentTab==='panel'){countUp('saldoAnim',getSaldo());countUp('gastosAnim',getGastosMes());}
  window.scrollTo({top:0,behavior:'smooth'});
  // Attach formatted inputs
  setTimeout(function(){
    document.querySelectorAll('input[type=number], input[inputmode=numeric]').forEach(function(el){
      if(!el._fmtAttached && el.id !== 'txFecha') attachFmtInput(el);
    });
  }, 50);
}

function setTab(tab,btn,navId) {
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  if(btn){btn.classList.add('active');}
  else{document.querySelectorAll('.tab').forEach(function(t){if((t.getAttribute('onclick')||'').indexOf("'"+tab+"'")>=0)t.classList.add('active');});}
  document.querySelectorAll('.nbtn').forEach(function(b){b.classList.remove('active');});
  var nav=document.getElementById('nav-'+(navId||tab));
  if(nav)nav.classList.add('active');
  render();
}
function toggleMini() {
  miniMode=!miniMode;
  var btn=document.getElementById('btnMini'); if(btn){btn.textContent=miniMode?'Full':'Mini'; btn.classList.toggle('on',miniMode);}
  var agrBtn=document.getElementById('btnAgregar'); if(agrBtn) agrBtn.style.display=miniMode?'none':'';
  var themeBtn=document.getElementById('btnTheme'); if(themeBtn) themeBtn.style.display=miniMode?'none':'';
  render();
}
function toggleTheme() {
  DB.darkMode=!DB.darkMode; saveDB();

// ─── DEUDAS ──────────────────────────────────────────────────────────────────
function renderDeudas() {
  if(!DB.deudas) DB.deudas = [];
  var deudas = DB.deudas;

  // Totales
  var totalDeuda = deudas.reduce(function(s,d){ return s + deudaRestante(d); }, 0);
  var totalMensual = deudas.reduce(function(s,d){ return s + (d.activa ? d.cuota : 0); }, 0);
  var dolar = getDolar();
  var tc = typeof dolar.venta === 'number' ? dolar.venta : 1360;

  function deudaRestante(d) {
    return d.tipo === 'cuotas'
      ? d.cuota * d.cuotasRestantes
      : d.montoTotal - d.montoPagado;
  }
  function progresoPct(d) {
    if(d.tipo === 'cuotas') {
      var total = d.cuota * (d.cuotasTotales || (d.cuotasTotales = d.cuotasRestantes));
      var pagado = total - d.cuota * d.cuotasRestantes;
      return Math.round((pagado / total) * 100);
    }
    return Math.round(((d.montoPagado||0) / d.montoTotal) * 100);
  }

  var resumen = '<div class="g2">'
    + '<div class="card" style="background:#1c0a00;border-color:#ef444433;text-align:center">'
    + '<div class="lbl">Total adeudado</div>'
    + '<div style="color:#ef4444;font-size:22px;font-weight:800;font-family:monospace;margin-top:6px">' + fmt(totalDeuda) + '</div>'
    + '<div style="color:#64748b;font-size:11px;margin-top:4px">≈ USD ' + Math.round(totalDeuda/tc).toLocaleString() + '</div>'
    + '</div>'
    + '<div class="card" style="background:#0a0e1a;border-color:#f9731633;text-align:center">'
    + '<div class="lbl">Cuotas este mes</div>'
    + '<div style="color:#f97316;font-size:22px;font-weight:800;font-family:monospace;margin-top:6px">' + fmt(totalMensual) + '</div>'
    + '<div style="color:#64748b;font-size:11px;margin-top:4px">' + Math.round((totalMensual/DB.ingresos)*100) + '% del sueldo</div>'
    + '</div></div>';

  var lista = deudas.length === 0
    ? '<div style="color:#475569;text-align:center;padding:28px;font-size:13px">No tenés deudas registradas.<br>¡Eso es una buena noticia! 🎉<br><br>Si tenés, agregala abajo 👇</div>'
    : deudas.map(function(d) {
        var restante = deudaRestante(d);
        var pct2 = progresoPct(d);
        var color = d.tipo === 'cuotas' ? '#f97316' : (d.interes > 50 ? '#ef4444' : '#a855f7');
        var badge = d.tipo === 'cuotas'
          ? d.cuotasRestantes + ' cuotas restantes'
          : (d.interes ? d.interes + '% TNA' : 'Sin interés');
        var detalle = d.tipo === 'cuotas'
          ? '<div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:#64748b">'
            + '<span>Cuota: <strong style="color:#f8fafc">' + fmt(d.cuota) + '</strong></span>'
            + '<span>Quedan: <strong style="color:' + color + '">' + d.cuotasRestantes + '/' + (d.cuotasTotales||d.cuotasRestantes) + '</strong></span>'
            + '</div>'
          : '<div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:#64748b">'
            + '<span>Pagado: <strong style="color:#22c55e">' + fmt(d.montoPagado||0) + '</strong></span>'
            + '<span>Total: <strong style="color:#f8fafc">' + fmt(d.montoTotal) + '</strong></span>'
            + '</div>';
        return '<div class="card" style="border-color:' + color + '33;box-shadow:0 0 16px ' + color + '11;' + (!d.activa ? 'opacity:0.5' : '') + '">'
          + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'
          + '<div style="display:flex;align-items:center;gap:10px">'
          + '<span style="font-size:26px">' + (d.icon||'💳') + '</span>'
          + '<div><div style="color:#f8fafc;font-weight:700;font-size:15px">' + d.nombre + '</div>'
          + '<div style="color:#64748b;font-size:12px;margin-top:2px">' + (d.acreedor||'') + '</div></div></div>'
          + '<div style="text-align:right">'
          + '<div style="color:' + color + ';font-weight:800;font-size:16px;font-family:monospace">' + fmt(restante) + '</div>'
          + '<div style="color:#475569;font-size:11px;margin-top:2px">' + badge + '</div>'
          + '</div></div>'
          + pb(pct2, 100, color, 8)
          + detalle
          + '<div style="display:flex;gap:8px;margin-top:12px">'
          + (d.tipo === 'cuotas' && d.activa
            ? '<button class="btn gho" style="padding:8px;font-size:12px" onclick="pagarCuota(' + d.id + ')">✅ Pagar cuota</button>'
            : '')
          + (d.tipo === 'libre' && d.activa
            ? '<button class="btn gho" style="padding:8px;font-size:12px" onclick="openModal(\'pagarDeuda\',' + d.id + ')">💸 Registrar pago</button>'
            : '')
          + '<button class="btn gho" style="padding:8px;font-size:12px;flex:0.4;color:' + (d.activa ? '#f59e0b' : '#22c55e') + '" onclick="toggleDeuda(' + d.id + ')">'
          + (d.activa ? '⏸' : '▶️') + '</button>'
          + '<button class="btn gho" style="padding:8px;font-size:12px;flex:0.3" onclick="deleteDeuda(' + d.id + ')">🗑</button>'
          + '</div></div>';
      }).join('');

  // Alertas de deuda
  var alertas = '';
  var cuotasAltas = deudas.filter(function(d){ return d.activa && d.interes >= 80; });
  if(cuotasAltas.length > 0) alertas += '<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #1e293b;font-size:13px"><span>⚠️</span><span style="color:#ef4444">Tenés deudas con interés muy alto (+80% TNA). Priorizar cancelarlas primero.</span></div>';
  var pesoSueldo = Math.round((totalMensual/DB.ingresos)*100);
  if(pesoSueldo > 30) alertas += '<div style="display:flex;gap:10px;padding:8px 0;font-size:13px"><span>🚨</span><span style="color:#f97316">Tus cuotas son el ' + pesoSueldo + '% de tu sueldo. Lo ideal es menos del 30%.</span></div>';
  if(!alertas) alertas = '<div style="display:flex;gap:10px;padding:8px 0;font-size:13px"><span>✅</span><span style="color:#22c55e">Deudas bajo control.</span></div>';

  return resumen
    + '<div class="card" style="padding:14px 18px"><div style="color:#f59e0b;font-size:13px;font-weight:700;margin-bottom:8px">⚠️ Alertas</div>' + alertas + '</div>'
    + '<div style="color:#94a3b8;font-size:13px;margin-bottom:14px">💳 Tus deudas</div>'
    + lista
    + '<button class="btn pri" onclick="openModal(\'nuevaDeuda\')">+ Nueva deuda / cuota</button>'
    + '<div class="card" style="background:#0a1020;border-color:#3b82f633;margin-top:14px">'
    + '<div style="color:#60a5fa;font-size:13px;font-weight:700;margin-bottom:8px">💡 Estrategia anti-deuda</div>'
    + '<div style="font-size:13px;color:#94a3b8;line-height:1.7">'
    + '<div>🔴 <strong style="color:#f8fafc">Método avalancha:</strong> pagá primero la de mayor interés. Ahorrás más plata.</div>'
    + '<div style="margin-top:6px">🔵 <strong style="color:#f8fafc">Método bola de nieve:</strong> pagá primero la más chica. Más motivación.</div>'
    + '</div></div>';
}

function pagarCuota(id) {
  var d = (DB.deudas||[]).find(function(x){ return x.id===id; });
  if(!d) return;
  d.cuotasRestantes = Math.max(0, d.cuotasRestantes - 1);
  if(d.cuotasRestantes === 0) { d.activa = false; addXP(100, '¡Deuda cancelada! 🎉'); }
  else { addXP(20, 'Cuota pagada 💪'); }
  saveDB(); render();
}
function toggleDeuda(id) {
  var d = (DB.deudas||[]).find(function(x){ return x.id===id; });
  if(d) { d.activa = !d.activa; saveDB(); render(); }
}
function deleteDeuda(id) {
  if(!confirm('¿Eliminar esta deuda?')) return;
  DB.deudas = (DB.deudas||[]).filter(function(d){ return d.id!==id; });
  saveDB(); toast('Deuda eliminada'); render();
}
function agregarDeuda() {
  var nombre = document.getElementById('dNombre').value.trim();
  var tipo   = document.getElementById('dTipo').value;
  var acreedor = document.getElementById('dAcreedor').value.trim();
  var icon   = document.getElementById('dIcon').value.trim() || '💳';
  if(!nombre) { toast('⚠️ Ingresá un nombre'); return; }

  var deuda = { id:genId(), nombre:nombre, tipo:tipo, acreedor:acreedor, icon:icon, activa:true };

  if(tipo === 'cuotas') {
    var cuota  = parseFloat(document.getElementById('dCuota').value);
    var cuotas = parseInt(document.getElementById('dCuotas').value);
    if(!cuota||!cuotas) { toast('⚠️ Ingresá cuota y cantidad'); return; }
    deuda.cuota = cuota;
    deuda.cuotasRestantes = cuotas;
    deuda.cuotasTotales = cuotas;
    deuda.interes = parseFloat(document.getElementById('dInteres').value)||0;
  } else {
    var monto = parseFloat(document.getElementById('dMonto').value);
    if(!monto) { toast('⚠️ Ingresá el monto'); return; }
    deuda.montoTotal = monto;
    deuda.montoPagado = 0;
    deuda.interes = parseFloat(document.getElementById('dInteres').value)||0;
  }

  if(!DB.deudas) DB.deudas = [];
  DB.deudas.push(deuda);
  saveDB(); addXP(10,'Deuda registrada'); closeModal(); setTab('deudas');
}
function pagarDeudaLibre(id) {
  var monto = parseFloat(document.getElementById('pagoMonto').value);
  if(!monto||monto<=0) { toast('⚠️ Ingresá un monto válido'); return; }
  var d = (DB.deudas||[]).find(function(x){ return x.id===id; });
  if(!d) return;
  d.montoPagado = Math.min((d.montoPagado||0) + monto, d.montoTotal);
  if(d.montoPagado >= d.montoTotal) { d.activa = false; addXP(100,'¡Deuda cancelada! 🎉'); }
  else addXP(20,'Pago registrado 💪');
  saveDB(); closeModal(); render();
}

function actualizarHistorialMensual() {
  var now=new Date(), mes=now.toLocaleString('es-AR',{month:'short'});
  mes=mes.charAt(0).toUpperCase()+mes.slice(1).replace('.','');
  var ingMes=getMesActual().filter(function(t){return t.tipo==='ingreso';}).reduce(function(s,t){return s+t.monto;},0);
  var gastMes=getGastosMes();
  var saldoReal=getSaldo();
  var hist=DB.historialMensual;
  if(hist.length>0 && hist[hist.length-1].mes===mes){
    hist[hist.length-1].ingresos=ingMes; hist[hist.length-1].gastos=gastMes; hist[hist.length-1].saldo=saldoReal;
  } else {
    hist.push({mes:mes,ingresos:ingMes,gastos:gastMes,saldo:saldoReal});
    if(hist.length>12) hist.shift();
  }
  saveDB();
}

var vozRecognition = null, vozEscuchando = false;

function iniciarVoz() {
  if(vozEscuchando) { detenerVoz(); return; }
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition) {
    toast('⚠️ Tu navegador no soporta reconocimiento de voz. Usá Chrome o Safari iOS.');
    return;
  }
  vozRecognition = new SpeechRecognition();
  vozRecognition.lang = 'es-AR';
  vozRecognition.continuous = false;
  vozRecognition.interimResults = false;
  vozRecognition.maxAlternatives = 1;

  vozRecognition.onstart = function() {
    vozEscuchando = true;
    document.getElementById('vozIcon').textContent = '⏹️';
    document.getElementById('vozLabel').textContent = 'Parar';
    document.getElementById('vozPulse').style.display = 'block';
    document.getElementById('btnVoz').style.color = '#ef4444';
    mostrarModalVoz('🎙️ Escuchando...', '', true);
  };

  vozRecognition.onresult = function(e) {
    var texto = e.results[0][0].transcript;
    document.getElementById('vozTranscript').textContent = '"' + texto + '"';
    document.getElementById('vozStatus').textContent = '🤔 Interpretando...';
    interpretarVoz(texto);
  };

  vozRecognition.onerror = function(e) {
    detenerVoz();
    var msgs = { 'no-speech':'No escuché nada. Intentá de nuevo.', 'not-allowed':'Permiso de micrófono denegado.', 'network':'Error de red.' };
    toast('⚠️ ' + (msgs[e.error] || 'Error: ' + e.error));
    closeModal();
  };

  vozRecognition.onend = function() {
    detenerVoz();
  };

  vozRecognition.start();
}

function interpretarVoz(texto) {
  // Primero intentar parseo local rápido sin API
  var resultado = parsearVozLocal(texto);
  if(resultado) {
    mostrarConfirmacionVoz(resultado, texto);
    return;
  }
  // Si no se puede parsear localmente, usar IA
  if(!DB.apiKey) {
    mostrarConfirmacionVozManual(texto);
    return;
  }
  var prompt = 'Interpretá este texto como un movimiento financiero en pesos argentinos. Respondé SOLO con JSON válido sin markdown:\n'
    + '{"tipo":"gasto|ingreso","monto":NUMERO,"desc":"descripcion corta","cat":"comida|transporte|salidas|servicios|ropa|sueldo|extra|otro"}\n'
    + 'Texto: "' + texto + '"\n'
    + 'Reglas: monto siempre en números, sin puntos ni comas. Si dice "mil" = 1000, "millón" = 1000000. Si no es claro el tipo, asumí gasto.';

  fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':DB.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:150,messages:[{role:'user',content:prompt}]})
  }).then(function(r){return r.json();})
  .then(function(data){
    var text=(data.content&&data.content[0]&&data.content[0].text)||'';
    try {
      var clean=text.replace(/```json|```/g,'').trim();
      var obj=JSON.parse(clean);
      mostrarConfirmacionVoz(obj, texto);
    } catch(e) {
      mostrarConfirmacionVozManual(texto);
    }
  })
  .catch(function(){
    var local=parsearVozLocal(texto);
    if(local) mostrarConfirmacionVoz(local, texto);
    else mostrarConfirmacionVozManual(texto);
  });
}

function parsearVozLocal(texto) {
  var t = texto.toLowerCase().trim();
  // Detectar tipo
  var tipo = 'gasto';
  if(/cobr|sueldo|ingres|deposi|entraron|pagar(on)?me|me pag/i.test(t)) tipo = 'ingreso';

  // Extraer monto — soporta "cinco mil", "5000", "5k", "un millón"
  var palabras = { 'cero':0,'uno':1,'dos':2,'tres':3,'cuatro':4,'cinco':5,'seis':6,'siete':7,'ocho':8,'nueve':9,
    'diez':10,'once':11,'doce':12,'trece':13,'catorce':14,'quince':15,'veinte':20,'treinta':30,'cuarenta':40,
    'cincuenta':50,'sesenta':60,'setenta':70,'ochenta':80,'noventa':90,'cien':100,'ciento':100,'doscientos':200,
    'trescientos':300,'cuatrocientos':400,'quinientos':500,'seiscientos':600,'setecientos':700,'ochocientos':800,
    'novecientos':900,'mil':1000,'millón':1000000,'millon':1000000 };
  var monto = 0;
  // Primero intentar número directo
  var numMatch = t.match(/(\d[\d.,]*)/);
  if(numMatch) {
    monto = parseFloat(numMatch[1].replace(/\./g,'').replace(',','.'));
    if(t.includes('mil') && monto < 1000) monto *= 1000;
    if(t.includes('k') || t.includes('K')) monto *= 1000;
  } else {
    // Parseo de palabras numéricas
    var acc = 0, curr = 0;
    t.split(/\s+/).forEach(function(w){
      if(palabras[w] !== undefined) {
        if(w === 'mil') { curr = (curr||1)*1000; acc += curr; curr = 0; }
        else if(w === 'millón' || w === 'millon') { curr = (curr||1)*1000000; acc += curr; curr = 0; }
        else curr += palabras[w];
      }
    });
    monto = acc + curr;
  }
  if(!monto || monto <= 0) return null;

  // Detectar categoría
  var cat = 'otro';
  if(/comida|super|mercado|almac|restau|pizza|burger|empanada|fiambre|verdura|fruta|kiosk|cafet|cafe|café/i.test(t)) cat='comida';
  else if(/colectivo|sube|uber|taxi|remis|nafta|combusti|estacion|peaje|tren|subte|transporte/i.test(t)) cat='transporte';
  else if(/bar|boliche|salida|teatro|cine|disco|fiesta|tragos|cerveza|birra/i.test(t)) cat='salidas';
  else if(/luz|gas|agua|internet|telefon|celular|expensa|alquiler|servicio/i.test(t)) cat='servicios';
  else if(/ropa|zapato|camisa|pantalon|remera|zapatilla|remer/i.test(t)) cat='ropa';
  else if(/sueldo|salario|cobr/i.test(t)) cat='sueldo';
  else if(/extra|bono|regalo|devolucion|reintegro/i.test(t)) cat='extra';

  // Descripción: limpiar texto
  var desc = texto.replace(/\b(gast[eé]|compr[eé]|pagu[eé]|sali[oó]|me cobr|cobr[eé]|deposi|ingres)\b/gi,'').replace(/\b(pesos?|plata)\b/gi,'').trim();
  desc = desc.charAt(0).toUpperCase() + desc.slice(1);
  if(desc.length > 40) desc = desc.substring(0,40);
  if(!desc || desc.length < 2) desc = (CATS[cat]||{label:'Gasto'}).label;

  return {tipo:tipo, monto:monto, desc:desc, cat:cat};
}

  qTipo = tipo;
  var gb = document.getElementById('qBtnGasto'), ib = document.getElementById('qBtnIngreso');
  if(gb) { gb.style.background = tipo==='gasto'?'#ef444422':'#1e293b'; gb.style.color = tipo==='gasto'?'#ef4444':'#64748b'; gb.style.border = tipo==='gasto'?'1px solid #ef444444':'none'; }
  if(ib) { ib.style.background = tipo==='ingreso'?'#22c55e22':'#1e293b'; ib.style.color = tipo==='ingreso'?'#22c55e':'#64748b'; ib.style.border = tipo==='ingreso'?'1px solid #22c55e44':'none'; }
  updateQDisplay();
}

function initQKeypad() {
  // Category buttons
  var catDiv = document.getElementById('qCatBtns');
  if(catDiv) {
    catDiv.innerHTML = Object.keys(CATS).slice(0,6).map(function(k){
      return '<button onclick="qCat=\''+k+'\';document.querySelectorAll(\'.qcatbtn\').forEach(function(b){b.style.background=\'#1e293b\';b.style.color=\'#64748b\'});this.style.background=\''+CATS[k].color+'33\';this.style.color=\''+CATS[k].color+'\'" '
        +'class="qcatbtn" style="background:'+(k==='comida'?CATS[k].color+'33':'#1e293b')+';color:'+(k==='comida'?CATS[k].color:'#64748b')+';border:none;border-radius:8px;padding:5px 8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600">'
        +CATS[k].icon+' '+CATS[k].label+'</button>';
    }).join('');
    qCat = 'comida';
  }
  // Billetera buttons
  var billDiv = document.getElementById('qBillBtns');
  if(billDiv) {
    var bills = DB.billeteras||[];
    var billsSort=[].concat(DB.billeteras||[]).sort(function(a,b){return b.saldo-a.saldo;});
    qBilletera = billsSort.length ? billsSort[0].id : null;
    billDiv.innerHTML = bills.map(function(b,i){
      var active = i===0;
      return '<button onclick="setQBill('+b.id+')" id="qbill_'+b.id+'" style="flex-shrink:0;background:'+(active?b.color+'33':'#1e293b')+';color:'+(active?b.color:'#64748b')+';border:'+(active?'1px solid '+b.color+'66':'none')+';border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap">'+b.icon+' '+b.nombre+'</button>';
    }).join('');
  }
  // Numpad
  var kp = document.getElementById('qKeypad');
  if(!kp) return;
  var keys = ['1','2','3','4','5','6','7','8','9','000','0','⌫'];
  kp.innerHTML = keys.map(function(k){
    return '<button onclick="qKeyPress(\''+k+'\')" style="background:#1e293b;border:none;border-radius:12px;padding:16px;color:#f8fafc;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .1s;-webkit-tap-highlight-color:transparent" ontouchstart="this.style.background=\'#334155\'" ontouchend="this.style.background=\'#1e293b\'">'+k+'</button>';
  }).join('');
}

function qKeyPress(k) {
  if(k==='⌫') { qMonto = qMonto.slice(0,-1); }
  else if(k==='000') { if(qMonto) qMonto += '000'; }
  else { if(qMonto.length < 8) qMonto += k; }
  updateQDisplay();
}

function updateQDisplay() {
  var el = document.getElementById('qDisplay'); if(!el) return;
  var n = parseInt(qMonto||'0');
  var color = qTipo==='gasto' ? '#ef4444' : '#22c55e';
  el.style.color = color;
  el.textContent = n > 0 ? (qTipo==='gasto'?'-':'+')+fmt(n) : '$0';
}

function setQBill(id) {
  qBilletera = id;
  (DB.billeteras||[]).forEach(function(b){
    var btn = document.getElementById('qbill_'+b.id);
    if(!btn) return;
    var active = b.id===id;
    btn.style.background = active ? b.color+'33' : '#1e293b';
    btn.style.color = active ? b.color : '#64748b';
    btn.style.border = active ? '1px solid '+b.color+'66' : 'none';
  });
}

function guardarRapido() {
  var monto = parseInt(qMonto||'0');
  if(!monto || monto<=0) { toast('⚠️ Ingresá un monto'); return; }
  var desc = (document.getElementById('qDesc')||{}).value || (CATS[qCat]||{label:'Gasto'}).label;
  if(!desc.trim()) desc = (CATS[qCat]||{label:'Gasto'}).label;
  // Afectar saldo de billetera seleccionada
  if(qBilletera) {
    var bill = (DB.billeteras||[]).find(function(b){return b.id===qBilletera;});
    if(bill) bill.saldo += qTipo==='gasto' ? -monto : monto;
  }
  DB.transacciones.unshift({id:genId(),tipo:qTipo,monto:monto,montoOrig:monto,moneda:'ARS',cat:qCat,desc:desc.trim(),billetera:qBilletera,fecha:new Date().toISOString().slice(0,10)});
  DB.racha = Math.min(DB.racha+1,365);
  if(DB.logros.indexOf('primer_gasto')<0) DB.logros.push('primer_gasto');
  actualizarHistorialMensual();
  saveDB();
  addXP(qTipo==='ingreso'?20:15,'Gasto rápido ⚡');
  cerrarFAB();
  var billNom = qBilletera ? ((DB.billeteras||[]).find(function(b){return b.id===qBilletera;})||{}).nombre||'' : '';
  toast((qTipo==='gasto'?'💸 -':'💰 +')+fmt(monto)+(billNom?' · '+billNom:'')+' ⚡');
  if(currentTab==='panel') render();
}

// ─── FAVORITOS ────────────────────────────────────────────────────────────────
function renderQFavs() {
  var el = document.getElementById('qFavList'); if(!el) return;
  var favs = DB.favoritos||[];
  if(favs.length===0) { el.innerHTML='<div style="color:#475569;text-align:center;padding:16px;font-size:13px">No tenés favoritos. Agregá uno 👇</div>'; return; }
  el.innerHTML = favs.map(function(f){
    var c = CATS[f.cat]||CATS.otro;
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #1e293b">'
      +'<button onclick="usarFav('+f.id+')" style="flex:1;display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;text-align:left;padding:0">'
      +'<span style="font-size:26px;background:#1e293b;border-radius:10px;padding:6px;min-width:40px;text-align:center">'+f.icon+'</span>'
      +'<div><div style="color:#f8fafc;font-weight:600;font-size:14px">'+f.desc+'</div>'
      +'<div style="color:#64748b;font-size:12px">'+c.label+' · '+(f.tipo==='gasto'?'<span style="color:#ef4444">-':'<span style="color:#22c55e">+')+fmt(f.monto)+'</span></div></div></button>'
      +'<button onclick="deleteFav('+f.id+')" style="background:none;border:none;color:#334155;font-size:18px;cursor:pointer;padding:4px 8px">✕</button>'
      +'</div>';
  }).join('');
}

function usarFav(id) {
  var f = (DB.favoritos||[]).find(function(x){return x.id===id;});
  if(!f) return;
  // Usar primera billetera por defecto (la misma que el teclado rápido)
  // Billetera: la del favorito > la del widget > la de mayor saldo
  var billId = f.billetera || qBilletera || ((DB.billeteras||[]).slice().sort(function(a,b){return b.saldo-a.saldo;})[0]||{}).id || null;
  if(billId){
    var bill=(DB.billeteras||[]).find(function(b){return b.id===billId;});
    if(bill) bill.saldo += f.tipo==='gasto' ? -f.monto : f.monto;
  }
  DB.transacciones.unshift({id:genId(),tipo:f.tipo,monto:f.monto,montoOrig:f.monto,moneda:'ARS',cat:f.cat,desc:f.desc,fecha:new Date().toISOString().slice(0,10),billetera:billId});
  DB.racha = Math.min(DB.racha+1,365);
  if(DB.logros.indexOf('primer_gasto')<0) DB.logros.push('primer_gasto');
  actualizarHistorialMensual(); saveDB();
  addXP(f.tipo==='ingreso'?20:15,'Favorito usado ⭐');
  cerrarFAB();
  toast((f.tipo==='gasto'?'💸 -':'💰 +')+fmt(f.monto)+' — '+f.desc+' ⭐');
  if(currentTab==='panel') render();
}

function deleteFav(id) {
  DB.favoritos = (DB.favoritos||[]).filter(function(f){return f.id!==id;});
  saveDB(); renderQFavs();
}

function agregarFav() {
  var desc  = document.getElementById('favDesc').value.trim();
  var monto = rawNum('favMonto');
  var cat   = document.getElementById('favCat').value;
  var icon  = document.getElementById('favIcon').value.trim() || (CATS[cat]||{icon:'⭐'}).icon;
  var tipo  = document.getElementById('favTipo').value;
  if(!desc||!monto){toast('⚠️ Completá descripción y monto');return;}
  if(!DB.favoritos) DB.favoritos=[];
  var favBillId=document.getElementById('favBill')?parseInt(document.getElementById('favBill').value)||null:null;
  DB.favoritos.push({id:genId(),desc:desc,monto:monto,cat:cat,icon:icon,tipo:tipo,billetera:favBillId});
  saveDB(); toast('⭐ Favorito guardado'); closeModal();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
if(DB.darkMode===undefined) DB.darkMode=true;
document.body.classList.toggle('light',!DB.darkMode);
var themeBtn=document.getElementById('btnTheme'); if(themeBtn) themeBtn.textContent=DB.darkMode?'🌙':'☀️';
// Cargar categorías personalizadas guardadas
Object.keys(DB.catsExtra||{}).forEach(function(k){ CATS[k]=DB.catsExtra[k]; PRESUP[k]=PRESUP[k]||0; });
actualizarHistorialMensual();
fetchDolar(true);
setTimeout(checkNotifications, 3000);
setInterval(function(){ fetchDolar(true).then(function(){ if(currentTab==='panel'||currentTab==='inflacion') render(); }); }, 300000);
render();

</script>
